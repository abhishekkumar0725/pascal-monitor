# Cloudflare Tunnel Configuration for Pascal Web Logger
#
# This allows public access to Pascal without opening router ports.
#
# Setup:
#   1. Install cloudflared on the Pi
#   2. Run: cloudflared tunnel login
#   3. Run: cloudflared tunnel create pascal
#   4. Copy this file to ~/.cloudflared/config.yml
#   5. Update the tunnel ID and hostname below
#   6. Run: cloudflared tunnel route dns pascal pascal.yourdomain.com
#   7. Run: cloudflared service install
#   8. Run: sudo systemctl start cloudflared
#
# See: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/

# Replace with your tunnel ID (from 'cloudflared tunnel create')
tunnel: YOUR_TUNNEL_ID

# Credentials file (auto-created during tunnel creation)
credentials-file: /home/pi/.cloudflared/YOUR_TUNNEL_ID.json

ingress:
  # Replace with your domain
  - hostname: pascal.yourdomain.com
    service: http://localhost:8000

  # Catch-all (required)
  - service: http_status:404
